name: CanvEx Build Pipeline

on:
  repository_dispatch:
    types: [canvex-build]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Setup workspace
        run: mkdir -p /tmp/canvex/input /tmp/canvex/output

      - name: Cache Docker image
        id: cache-docker
        uses: actions/cache@v4
        with:
          path: /tmp/canvex-image
          key: canvex-docker-v1.2

      - name: Load or pull CanvEx Docker image
        run: |
          if [ -f /tmp/canvex-image/canvex.tar ]; then
            echo ">>> Loading cached Docker image..."
            docker load -i /tmp/canvex-image/canvex.tar
          else
            echo ">>> Pulling Docker image..."
            docker pull vedantbarhate/canvex:v1.2
            mkdir -p /tmp/canvex-image
            docker save vedantbarhate/canvex:v1.2 -o /tmp/canvex-image/canvex.tar
          fi

      - name: Debug payload
        run: |
          echo "App name: ${{ github.event.client_payload.app_name }}"
          echo "Code length: ${{ github.event.client_payload.code }}" | wc -c

      - name: Write App.jsx from payload
        run: |
          mkdir -p /tmp/canvex/input
          cat << 'EOF' > /tmp/canvex/input/code.b64
          ${{ github.event.client_payload.code }}
          EOF
          base64 -d /tmp/canvex/input/code.b64 > /tmp/canvex/input/App.jsx
          echo ">>> App.jsx written successfully"
          wc -c /tmp/canvex/input/App.jsx

      - name: Run CanvEx pipeline
        run: |
          docker run --rm \
            -v /tmp/canvex/input:/input \
            -v /tmp/canvex/output:/output \
            -e APP_NAME="${{ github.event.client_payload.app_name }}" \
            vedantbarhate/canvex:v1.2

      - name: Find and upload .exe artifact
        run: |
          EXE_PATH=$(find /tmp/canvex/output -name "*.exe" | head -n 1)
          echo "Found exe: $EXE_PATH"
          cp "$EXE_PATH" /tmp/canvex/canvex-app.exe

      - name: Upload .exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: canvex-output
          path: /tmp/canvex/canvex-app.exe
          retention-days: 1