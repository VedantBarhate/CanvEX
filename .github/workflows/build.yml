name: CanvEx Build Pipeline

on:
  repository_dispatch:
    types: [canvex-build]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Setup workspace
        run: mkdir -p /tmp/canvex/input /tmp/canvex/output

      - name: Write App.jsx from payload
        run: |
          mkdir -p /tmp/canvex/input
          printf '%s' "$APP_CODE" > /tmp/canvex/input/App.jsx
          echo ">>> App.jsx written successfully"
          wc -c /tmp/canvex/input/App.jsx

      - name: Pull CanvEx Docker image
        run: docker pull vedantbarhate/canvex:v1.2

      - name: Run CanvEx pipeline
        run: |
          docker run --rm \
            -v /tmp/canvex/input:/input \
            -v /tmp/canvex/output:/output \
            -e APP_NAME="${{ github.event.client_payload.app_name }}" \
            vedantbarhate/canvex:v1.2

      - name: Upload .exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: canvex-output
          path: /tmp/canvex/output/
          retention-days: 1